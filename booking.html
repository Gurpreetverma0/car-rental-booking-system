<h1>Book Your  Drime Car</h1>

<form id="bookingForm">

<input type="text" id="fullName" placeholder="Full Name" required>

<br><br>

<input type="email" id="email" placeholder="Email" required>

<br><br>

<input type="date" id="pickupDate" required>

<br><br>

<input type="date" id="returnDate" required>

<br><br>

<select id="car" required>

<option value="">Select Car</option>

<option value="1200"> Mahindra Thar - ₹1200/day </option>

<option value="2500"> Hyundai Creta - ₹2500/day </option>

<option value="2000"> Tata Nexon - ₹2000/day </option>

<option value="1500"> Taxi car - ₹1500/day </option>

<option value="3000"> Toyota corolla - ₹3000/day </option>

<option value="2500"> Tesla model Y - ₹2500/day </option>

<option value="3000"> TFord F-Series - ₹3000/day </option>

<option value="2000"> Honda CR-V - ₹2000/day </option>

</select>

<br><br>

<input type="tel" id="phone" placeholder="Phone Number" required>

<br><br>

<button type="submit" class="book-btn">

Book Now

</button>

</form>
